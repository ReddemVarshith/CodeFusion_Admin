{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CodeStorm 2026 Admin{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'core/css/index.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    {% if user.is_authenticated %}
    <div class="app-container">
        <aside class="sidebar">
            <div class="nav-brand">CODESTORM 2026</div>
            <ul class="nav-links">
                <li class="nav-item">
                    <a href="{% url 'dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                        <i class="fa-solid fa-chart-line"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{% url 'team_list' %}" class="nav-link {% if request.resolver_match.url_name == 'team_list' %}active{% endif %}">
                        <i class="fa-solid fa-users"></i>
                        <span>Teams</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{% url 'member_list' %}" class="nav-link {% if request.resolver_match.url_name == 'member_list' %}active{% endif %}">
                        <i class="fa-solid fa-user"></i>
                        <span>Participants</span>
                    </a>
                </li>
                <li class="nav-item" style="margin-top: auto;">
                    <form action="{% url 'logout' %}" method="post" id="logout-form">
                        {% csrf_token %}
                        <a href="javascript:void(0)" onclick="document.getElementById('logout-form').submit();" class="nav-link">
                            <i class="fa-solid fa-right-from-bracket"></i>
                            <span>Logout</span>
                        </a>
                    </form>
                </li>
            </ul>
        </aside>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% else %}
        {% block login_content %}{% endblock %}
    {% endif %}
</body>
</html>
