services:
  - type: web
    name: codefusion-admin
    runtime: python
    buildCommand: "./render-build.sh"
    startCommand: "gunicorn codefusion_admin.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codefusion-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "codefusion-admin.onrender.com"

databases:
  - name: codefusion-db
    databaseName: codefusion_admin
    user: codefusion_user
